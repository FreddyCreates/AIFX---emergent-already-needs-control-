<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d946ef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background pill -->
  <rect x="0" y="0" width="600" height="200" rx="24" fill="#0f0f23"/>
  <!-- Organism symbol - golden spiral/phi -->
  <circle cx="100" cy="100" r="50" stroke="url(#grad1)" stroke-width="3" fill="none"/>
  <circle cx="100" cy="100" r="31" stroke="url(#grad1)" stroke-width="2.5" fill="none"/>
  <circle cx="100" cy="100" r="19" stroke="url(#grad1)" stroke-width="2" fill="none"/>
  <circle cx="100" cy="100" r="12" stroke="url(#grad1)" stroke-width="1.5" fill="none"/>
  <circle cx="100" cy="100" r="7" fill="url(#grad1)"/>
  <!-- Neural network nodes -->
  <circle cx="60" cy="65" r="4" fill="#6366f1" opacity="0.8"/>
  <circle cx="140" cy="70" r="4" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="75" cy="140" r="4" fill="#d946ef" opacity="0.8"/>
  <circle cx="130" cy="135" r="4" fill="#06b6d4" opacity="0.8"/>
  <line x1="60" y1="65" x2="100" y2="100" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  <line x1="140" y1="70" x2="100" y2="100" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
  <line x1="75" y1="140" x2="100" y2="100" stroke="#d946ef" stroke-width="1" opacity="0.4"/>
  <line x1="130" y1="135" x2="100" y2="100" stroke="#06b6d4" stroke-width="1" opacity="0.4"/>
  <!-- Text: SOVEREIGN ORGANISM -->
  <text x="170" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="white" letter-spacing="1">SOVEREIGN</text>
  <text x="170" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="url(#grad1)" letter-spacing="1">ORGANISM</text>
  <!-- Tagline -->
  <text x="170" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a1a1aa" letter-spacing="2">AI INTELLIGENCE · 230 PROTOCOLS · ONE MIND</text>
</svg>
