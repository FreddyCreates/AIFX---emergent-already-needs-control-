# ============================================================================
# Deploy to GitHub Pages — Sovereign Intelligence on the Raw Web
#
# Deploys the full organism to the live web at: https://itsnotailabs.com/
# Includes:
#   - Intelligence Runtime (web/intelligence-runtime.js)
#   - Service Worker (/sw.js) — intercepts /api/* for offline intelligence
#   - Interactive Console (/console.html)
#   - API Documentation (/api/)
#   - AI Agent Discovery (/.well-known/ai.json)
#   - All pages, SDKs, protocols, and extensions
#
# The intelligence is LIVE on the raw web. No server needed.
# Runs on every push to main. Fully autonomous — 24/7 from second one.
# ============================================================================

name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: false

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
