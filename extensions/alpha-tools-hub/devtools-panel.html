<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #f8fafc; font-family: 'JetBrains Mono', monospace; padding: 12px; font-size: 11px; }
    h2 { color: #a855f7; font-size: 13px; margin-bottom: 8px; }
    .panel { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 10px; margin-bottom: 10px; }
    .stat { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .stat:last-child { border-bottom: none; }
    .label { color: #64748b; }
    .value { color: #00ffcc; }
    #refresh { padding: 6px 12px; background: rgba(168,85,247,0.2); border: 1px solid rgba(168,85,247,0.4); border-radius: 4px; color: #a855f7; cursor: pointer; margin-top: 8px; }
  </style>
</head>
<body>
  <h2>⚡ Alpha Tools — DevTools Panel</h2>
  <div class="panel" id="stats">Loading...</div>
  <button id="refresh" onclick="loadStats()">Refresh</button>
  <script>
    function loadStats() {
      chrome.runtime.sendMessage({ type: 'ALPHA_STATUS' }, (status) => {
        if (!status) { document.getElementById('stats').textContent = 'Extension not responding'; return; }
        let html = '';
        for (const [cat, info] of Object.entries(status.tools || {})) {
          html += `<div class="stat"><span class="label">${cat}</span><span class="value">${info.uses} uses</span></div>`;
        }
        html += `<div class="stat"><span class="label">Heartbeat</span><span class="value">#${status.state.heartbeatCount}</span></div>`;
        document.getElementById('stats').innerHTML = html;
      });
    }
    loadStats();
    setInterval(loadStats, 5000);
  </script>
</body>
</html>
